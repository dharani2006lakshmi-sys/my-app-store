<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - App Not Found</title>
<style>
  body { background: #1a1a2e; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 50px; overflow: hidden; }
  h1 { font-size: 40px; color: #ff6b6b; }
  p { font-size: 18px; color: #b8b8d1; margin-bottom: 30px; }
  canvas { background: #16213e; border: 2px solid #e94560; border-radius: 10px; display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
  .btn { display: inline-block; padding: 12px 24px; background: #e94560; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
  .btn:hover { background: #c0392b; }
</style>
</head>
<body>
  <h1>404 - Page Not Found</h1>
  <p>The app you are looking for might have been removed. Play some Pong while you're here!</p>
  <canvas id="gameCanvas" width="600" height="400"></canvas>
  <br>
  <a href="index.html" class="btn">Return to App Store</a>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  
  let ball = { x: 300, y: 200, r: 10, dx: 4, dy: 4 };
  let paddle = { w: 100, h: 10, x: 250, y: 380 };
  let score = 0;
  
  document.addEventListener("mousemove", e => {
    let relativeX = e.clientX - canvas.getBoundingClientRect().left;
    if(relativeX > 0 && relativeX < canvas.width) {
      paddle.x = relativeX - paddle.w/2;
    }
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fillStyle = "#00f2fe";
    ctx.fill();
    ctx.closePath();
    
    // Draw paddle
    ctx.beginPath();
    ctx.rect(paddle.x, paddle.y, paddle.w, paddle.h);
    ctx.fillStyle = "#e94560";
    ctx.fill();
    ctx.closePath();
    
    // Score
    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);
    
    // Move ball
    ball.x += ball.dx;
    ball.y += ball.dy;
    
    if(ball.x + ball.dx > canvas.width - ball.r || ball.x + ball.dx < ball.r) ball.dx = -ball.dx;
    if(ball.y + ball.dy < ball.r) ball.dy = -ball.dy;
    else if(ball.y + ball.dy > canvas.height - ball.r) {
      if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        ball.dy = -ball.dy;
        score++;
        ball.dx *= 1.05; ball.dy *= 1.05;
      } else {
        // Game over reset
        score = 0;
        ball.x = 300; ball.y = 200;
        ball.dx = 4; ball.dy = 4;
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
